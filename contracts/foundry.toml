[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Build reproducible: compilador y optimizer pinneados (mismos settings que la
# verificación en Etherscan). Sin esto, un forge nuevo puede compilar distinto.
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
