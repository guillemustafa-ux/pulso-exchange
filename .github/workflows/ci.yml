name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  contracts:
    name: Contratos (Foundry)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Instalar Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build (solc pinneado en foundry.toml)
        run: forge build

      - name: Tests (unit + fuzz + invariantes)
        run: forge test -vv

  web:
    name: Frontend (Vite + TS estricto)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # 24 = mismo entorno que genera package-lock.json local (npm 11);
          # npm 10 (Node 22) materializa distinto los peers opcionales y npm ci falla
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint (oxlint, incluye no-explicit-any)
        run: npx oxlint src

      - name: i18n — paridad de claves entre locales (es/en/pt)
        run: npm run check:i18n

      - name: Educación — paridad de lecciones entre idiomas (es/en/pt)
        run: npm run check:lessons

      - name: Unit tests (vitest — lib/rates, lib/format, lessons)
        run: npm run test

      - name: Build (tsc -b + vite build)
        run: npm run build

      - name: Instalar Chromium para E2E
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright sobre el build, API stubbeada)
        run: npx playwright test

  api:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: La app importa y arranca (smoke)
        run: python -c "from app.main import app; print('OK:', app.title)"

      - name: Tests (pytest — motor de bots + fallback de market)
        run: pytest -q
